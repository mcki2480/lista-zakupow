<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Lista Zakupów</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #2d7a4f; --green-dark: #1f5c3a; --green-light: #e8f5ee;
    --red: #e74c3c; --border: #e5e7eb; --bg: #f4f6f5;
    --white: #ffffff; --text: #1a1a1a; --text-muted: #6b7280;
  }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

  .header { background: var(--green); padding: 20px 18px 22px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 22px; font-weight: 700; color: white; letter-spacing: -0.3px; margin-bottom: 10px; }
  .stats { display: flex; gap: 8px; }
  .stat { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: white; font-weight: 600; }

  .input-area { background: var(--white); padding: 12px 14px 10px; border-bottom: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .product-input { flex: 1; border: 1.5px solid var(--border); border-radius: 24px; padding: 11px 16px; font-size: 15px; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .product-input:focus { border-color: var(--green); background: white; }

  .btn-mic { width: 44px; height: 44px; border-radius: 50%; background: var(--bg); border: 1.5px solid var(--border); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .btn-mic.recording { background: var(--red); border-color: var(--red); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

  .btn-add { width: 44px; height: 44px; border-radius: 50%; background: var(--green); border: none; color: white; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.1s; }
  .btn-add:active { transform: scale(0.92); }

  .mic-status { font-size: 12px; color: var(--text-muted); margin-top: 6px; padding: 0 4px; min-height: 18px; }
  .mic-status.listening { color: var(--red); font-weight: 700; }
  .mic-status.success { color: var(--green-dark); font-weight: 700; }

  .filter-bar { display: flex; gap: 6px; padding: 10px 14px; background: var(--white); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; background: var(--white); color: var(--text-muted); font-family: 'Nunito', sans-serif; font-weight: 600; transition: all 0.15s; }
  .filter-chip.active { background: var(--green); border-color: var(--green); color: white; }

  .items-list { flex: 1; padding: 10px 14px 90px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .list-item { background: var(--white); border-radius: 14px; padding: 10px 10px 10px 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .list-item.bought { opacity: 0.45; }

  .move-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .btn-move { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; padding: 0; line-height: 1; }
  .btn-move:active { background: var(--green-light); border-color: var(--green); color: var(--green-dark); transform: scale(0.92); }
  .btn-move:disabled { opacity: 0.2; pointer-events: none; }

  .checkbox { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; transition: all 0.15s; }
  .checkbox.checked { background: var(--green); border-color: var(--green); }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .bought .item-name { text-decoration: line-through; color: var(--text-muted); }
  .item-note { font-size: 12px; color: var(--green-dark); background: var(--green-light); display: inline-block; margin-top: 3px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }

  .note-input-row { margin-top: 6px; display: flex; gap: 6px; }
  .note-field { flex: 1; border: 1.5px solid var(--green); border-radius: 10px; padding: 6px 10px; font-size: 13px; font-family: 'Nunito', sans-serif; background: var(--white); color: var(--text); outline: none; }
  .btn-save-note { border: none; background: var(--green); color: white; border-radius: 10px; padding: 6px 12px; font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; }

  .item-actions { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .btn-action { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; background: transparent; }
  .btn-action:active { transform: scale(0.88); }
  .btn-delete { color: #c0392b; }
  .btn-note { color: var(--green); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); gap: 10px; text-align: center; }
  .empty-icon { font-size: 52px; }
  .empty-state p { font-size: 15px; font-weight: 600; }
  .empty-state small { font-size: 13px; }

  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--white); border-top: 1px solid var(--border); padding: 10px 14px 16px; display: flex; gap: 10px; }
  .btn-bottom { flex: 1; padding: 11px 0; border-radius: 12px; font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; border: none; transition: transform 0.1s; }
  .btn-bottom:active { transform: scale(0.97); }
  .btn-clear { background: #fdecea; color: var(--red); }
  .btn-save { background: var(--green); color: white; }

  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #1a1a1a; color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 100; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🛒 Lista zakupów</h1>
    <div class="stats">
      <div class="stat" id="statTotal">0 produktów</div>
      <div class="stat" id="statBought">0 kupionych</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <button class="btn-mic" id="micBtn">🎤</button>
      <input class="product-input" id="productInput" placeholder="Wpisz lub powiedz produkt..." autocomplete="off" />
      <button class="btn-add" id="addBtn">+</button>
    </div>
    <div class="mic-status" id="micStatus">Naciśnij 🎤 aby dodać produkt głosem po polsku</div>
  </div>

  <div class="filter-bar">
    <button class="filter-chip active" data-filter="all">Wszystkie</button>
    <button class="filter-chip" data-filter="pending">Do kupienia</button>
    <button class="filter-chip" data-filter="bought">✓ Kupione</button>
  </div>

  <div class="items-list" id="itemsList"></div>

  <div class="bottom-bar">
    <button class="btn-bottom btn-clear" id="btnClear">Usuń kupione</button>
    <button class="btn-bottom btn-save" id="btnSave">💾 Zapisz listę</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const KEY = 'lista_zakupow_v1';
  let items = [];
  try { items = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) {}
  let nextId = items.length ? Math.max(...items.map(i => i.id)) + 1 : 1;
  let filter = 'all';

  const save = () => { try { localStorage.setItem(KEY, JSON.stringify(items)); } catch(e) {} };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getFiltered() {
    if (filter === 'pending') return items.filter(i => !i.bought);
    if (filter === 'bought')  return items.filter(i => i.bought);
    return items;
  }

  function render() {
    const total = items.length, bought = items.filter(i => i.bought).length;
    document.getElementById('statTotal').textContent = total + ' produktów';
    document.getElementById('statBought').textContent = bought + ' kupionych';

    const filtered = getFiltered();
    const list = document.getElementById('itemsList');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><p>Lista jest pusta</p><small>Wpisz lub powiedz co kupić</small></div>`;
      return;
    }

    list.innerHTML = filtered.map((item, idx) => `
      <div class="list-item ${item.bought ? 'bought' : ''}" data-id="${item.id}">
        <div class="move-btns">
          <button class="btn-move" onclick="moveItem(${item.id},-1)" ${idx === 0 ? 'disabled' : ''}>▲</button>
          <button class="btn-move" onclick="moveItem(${item.id},1)" ${idx === filtered.length - 1 ? 'disabled' : ''}>▼</button>
        </div>
        <div class="checkbox ${item.bought ? 'checked' : ''}" onclick="toggleBought(${item.id})">${item.bought ? '✓' : ''}</div>
        <div class="item-body">
          <div class="item-name">${esc(item.name)}</div>
          ${item.note ? `<div class="item-note">📝 ${esc(item.note)}</div>` : ''}
          ${item.showNote ? `<div class="note-input-row"><input class="note-field" id="nf-${item.id}" value="${esc(item.note)}" placeholder="np. 2 litry, bez laktozy..." /><button class="btn-save-note" onclick="saveNote(${item.id})">OK</button></div>` : ''}
        </div>
        <div class="item-actions">
          <button class="btn-action btn-note" onclick="toggleNote(${item.id})">📝</button>
          <button class="btn-action btn-delete" onclick="deleteItem(${item.id})">✕</button>
        </div>
      </div>`).join('');

    filtered.forEach(item => {
      if (item.showNote) {
        const f = document.getElementById('nf-' + item.id);
        if (f) { f.focus(); f.setSelectionRange(f.value.length, f.value.length); }
      }
    });
  }

  function moveItem(id, dir) {
    const filtered = getFiltered();
    const filteredIdx = filtered.findIndex(i => i.id === id);
    const targetIdx = filteredIdx + dir;
    if (targetIdx < 0 || targetIdx >= filtered.length) return;

    const realFrom = items.findIndex(i => i.id === filtered[filteredIdx].id);
    const realTo   = items.findIndex(i => i.id === filtered[targetIdx].id);
    if (realFrom === -1 || realTo === -1) return;

    const [moved] = items.splice(realFrom, 1);
    items.splice(realTo, 0, moved);
    save(); render();
  }

  function addItem(name) {
    name = name.trim(); if (!name) return;
    items.unshift({ id: nextId++, name, note: '', bought: false, showNote: false });
    document.getElementById('productInput').value = '';
    save(); render();
  }

  function toggleBought(id) {
    const i = items.find(x => x.id === id);
    if (i) { i.bought = !i.bought; save(); render(); }
  }

  function toggleNote(id) {
    items.forEach(i => { if (i.id !== id) i.showNote = false; });
    const i = items.find(x => x.id === id);
    if (i) { i.showNote = !i.showNote; render(); }
  }

  function saveNote(id) {
    const i = items.find(x => x.id === id), f = document.getElementById('nf-' + id);
    if (i && f) { i.note = f.value.trim(); i.showNote = false; save(); render(); }
  }

  function deleteItem(id) { items = items.filter(i => i.id !== id); save(); render(); }

  document.getElementById('addBtn').addEventListener('click', () => addItem(document.getElementById('productInput').value));
  document.getElementById('productInput').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(e.target.value); });

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active'); filter = chip.dataset.filter; render();
    });
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    const count = items.filter(i => i.bought).length;
    if (!count) { showToast('Brak kupionych produktów'); return; }
    items = items.filter(i => !i.bought); save(); render(); showToast('Usunięto ' + count + ' kupionych ✓');
  });

  document.getElementById('btnSave').addEventListener('click', () => { save(); showToast('Lista zapisana! ✓'); });

  // MIKROFON
  const micBtn = document.getElementById('micBtn');
  const micStatus = document.getElementById('micStatus');
  let recognition = null, isRecording = false;

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'pl-PL';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.continuous = false;

    recognition.onstart = () => {
      micStatus.textContent = '🔴 Słucham... mów teraz';
      micStatus.className = 'mic-status listening';
    };
    recognition.onresult = e => {
      const text = e.results[0][0].transcript;
      document.getElementById('productInput').value = text;
      micStatus.textContent = '✓ Rozpoznano: "' + text + '" — naciśnij + aby dodać';
      micStatus.className = 'mic-status success';
      stopRec();
    };
    recognition.onerror = e => {
      if (e.error === 'not-allowed') micStatus.textContent = '⚠ Brak zgody na mikrofon';
      else if (e.error === 'no-speech') micStatus.textContent = 'Nie wykryto mowy, spróbuj ponownie';
      else micStatus.textContent = 'Błąd: ' + e.error;
      micStatus.className = 'mic-status';
      stopRec();
    };
    recognition.onend = () => stopRec();
  } else {
    micBtn.style.opacity = '0.4';
    micStatus.textContent = '⚠ Mikrofon niedostępny — użyj Chrome';
  }

  function startRec() {
    if (!recognition) return;
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
    try { recognition.start(); } catch(e) {}
  }

  function stopRec() {
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
  }

  micBtn.addEventListener('click', () => {
    if (isRecording) { try { recognition.stop(); } catch(e) {} stopRec(); }
    else startRec();
  });

  render();
</script>
</body>
</html>
